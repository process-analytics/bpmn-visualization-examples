<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bpmn-visualization  - Comparison with bpmn-js</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="stylesheet" href="../../static/css/spectre.min.css" type="text/css">
  <link rel="stylesheet" href="../../static/css/icons.min.css" type="text/css">
  <link rel="stylesheet" href="../../static/css/main.css" type="text/css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tippy.js@6.3.1/themes/light-border.css" integrity="sha256-Fev9TKDfIZRihMeo+VloYBQ6vG1Pehn17SF0wQE1w/0=" crossorigin="anonymous">
  <style>
    .bpmn-container {
      /*top: 60px;*/
      /*bottom: 20px;*/

      left: 60px;
      right: 60px;
      /*TODO find a way to ensure it takes the whole available height*/
      height: 70%;
      /*width: 80%;*/

      border-style: solid;
      border-color: #B0B0B0;
      border-width: 1px;
      position: absolute;

      /* this ensures that the part of the diagram outside of the container is not displayed. */
      overflow: hidden;
    }
    .hidden {
      display: none !important;
    }

    #file-selector {
      float: left;
    }
    #loading-info {
      float: left;
      padding-top: 0.5em;
      margin-left: 1em;
    }
    #controls {
      padding-top: 0.5em;
    }

    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background-color: #5755d9;
      color: white;
      font-size: 11px;
      font-weight: bold;
      font-style: normal;
      cursor: help;
      margin-left: 4px;
      vertical-align: middle;
    }

    .info-tooltip-content {
      font-size: 13px;
      text-align: left;
    }
    .info-tooltip-content ul {
      margin: 8px 0 0 0;
      padding-left: 20px;
    }
    .info-tooltip-content li {
      margin-bottom: 4px;
    }
    .info-tooltip-content .note {
      margin-top: 10px;
      font-style: italic;
      color: #666;
    }

    #group-compat-mode {
      margin-top: 8px;
    }
  </style>
  <!-- Tooltip support -->
  <script defer src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha256-whL0tQWoY1Ku1iskqPFvmZ+CHsvmRWx/PIoEvIeWh4I=" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/tippy.js@6.3.7/dist/tippy-bundle.umd.min.js" integrity="sha256-Pw/nDrJszyj2iHoZLinTjdfvfC8HmnMwStQt3HvtN94=" crossorigin="anonymous"></script>
  <script defer src="../../static/js/link-to-sources.js"></script>
  <!-- load bpmn-js viewer distro (with pan and zoom) -->
  <script defer src="https://cdn.jsdelivr.net/npm/bpmn-js@18.5.0/dist/bpmn-navigated-viewer.production.min.js" integrity="sha256-nDLkOcUTZVEN4Qx/ioNMSH+yYgYk3NUbWMMW4AVaorc=" crossorigin="anonymous"></script>
  <!-- load bpmn-visualization -->
  <script defer src="https://cdn.jsdelivr.net/npm/bpmn-visualization@0.48.0/dist/bpmn-visualization.min.js" integrity="sha384-NRsOkK0vzHys+YUCN4gyKP53VEnmFOttUAN1Gu2CYPyEhLmKD2C6hObYtBhwy9nB" crossorigin="anonymous"></script>
  <script defer src="shared.js"></script>
  <script defer src="index.js"></script>
</head>
<body>

<header class="navbar bg-dark p-2">
  <section class="navbar-section ml-2">
    <a class="home" href="../../index.html">
      <img src="../../static/img/logo_64x64_white.png" alt="logo" class="logo">
      <span class="h3 text-light ml-2 lib-name-text">bpmn-visualization examples</span>
  </a>
</section>
  <section class="navbar-section">
    <a href="https://process-analytics.github.io/bpmn-visualization-js/" class="mr-2 btn btn-secondary">Docs</a>
    <div class="dropdown mr-2">
      <a href="#" class="btn btn-primary dropdown-toggle" tabindex="0">
        GitHub <span class="icon icon-caret icon-in-the-middle"></span>
      </a>
      <ul class="menu">
        <li><a href="https://github.com/process-analytics/bpmn-visualization-js" class="mr-2 btn btn-link">Library</a></li>
        <li><a href="https://github.com/process-analytics/bpmn-visualization-examples" class="mr-2 btn btn-link">Examples</a></li>
      </ul>
    </div>
  </section>
</header>


<section class="container col-11 flex-centered mt-2">
  <section class="col-12 mt-2 mb-2 relative">
    <h2>Compare <code>bpmn-visualization</code> with <code>bpmn-js</code></h2>
    Compare the two libraries on BPMN elements rendering and diagram navigation (zoom, pan).

    <div style="margin-top: 25px">
      <div id="group-file-selector" class="col-6 float-left">
        <div id="file-selector">
          <input type="file" id="btn-open-file" name="btn-open-file" class="hidden"/>
          <label for="btn-open-file" class="btn btn-primary has-icon-right"><span>Choose a local file </span><span
                  class="icon icon-upload mb-1"></span></label>
        </div>
        <div id="loading-info" class="hidden">
          <!--            TODO add info to explain what is in the builting diagram and what it shows-->
          <b>Last loaded file:</b> <span></span>
        </div>
      </div>

      <div id="controls" class="col-6 float-left">
        <div id="group-libs" class="col-12 float-left">
          <b>Library:</b>
          <label><input type="radio" name="bpmnLibrary" value="bpmn-visualization" checked> bpmn-visualization</label>
          <label><input type="radio" name="bpmnLibrary" value="bpmn-js"> bpmn-js</label>
          <span style="margin-left: 20px;">
<!--            TODO let reload the builin comparison diagram-->
<!--            TODO put a button like in the kie example and do not fit on load, but only when clicking on the button -->
            <label title="Ensure that the BPMN Diagram is fully displayed within the view"><input type="checkbox" id="fitView" name="fitView"> Fit view</label>
          </span>
        </div>

        <div id="group-compat-mode" class="col-12 float-left">
          <label>
            <input type="checkbox" id="bpmnJsCompatMode" name="bpmnJsCompatMode">
            bpmn-js compatible rendering
          </label>
          <i id="compat-info-icon" class="info-icon" aria-label="Information about compatibility mode">i</i>
        </div>
      </div>
    </div>
  </section>
</section>

<section class="col-11 mt-2 relative">
  <div id="container-bpmn-visualization" class="bpmn-container"></div>
  <div id="container-bpmn-js" class="bpmn-container hidden"></div>
</section>
</body>
</html>
